<!DOCTYPE html>
<html>
<head>
<title>Performer</title>

<style>
body {
  background:#0b161a;
  color:white;
  font-family:Arial;
  text-align:center;
  padding-top:100px;
}
#name {
  font-size:100px;
  font-weight:bold;
  margin-top:40px;
}
</style>

</head>

<body>

<h2>Latest Name</h2>

<div id="name">Waiting...</div>

  <script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getDatabase, ref, onValue, query, limitToLast } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAj3wXRNLj1XEWmHzlJbmAe7yIivEI0Xs4",
  authDomain: "mindreadt.firebaseapp.com",
  databaseURL: "https://mindreadt-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "mindreadt",
  storageBucket: "mindreadt.firebasestorage.app",
  messagingSenderId: "729775484202",
  appId: "1:729775484202:web:6ae6a82b35b1915b6c8253"
};

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

const latestSearch = query(
  ref(db, "searches"),
  limitToLast(1)
);

onValue(latestSearch, (snapshot) => {

  snapshot.forEach((child) => {

    document.getElementById("name").innerText =
    child.val().name;

  });

});

  </script>

</body>
</html>
